apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003

          envFrom:
            - configMapRef:
                name: payment-service-config

          env:
            - name: MONGO_URI
              value: "mongodb://admin:satish123@mongodb:27017"
            - name: JWT_SECRET_KEY
              value: "change-this-secret-key"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8002/api/v1"

          readinessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3