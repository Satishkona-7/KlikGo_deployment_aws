apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002

          envFrom:
            - configMapRef:
                name: order-service-config

          env:
            - name: MONGO_URI
              value: "mongodb://admin:satish123@mongodb:27017"
            - name: JWT_SECRET_KEY
              value: "change-this-secret-key"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8001/api/v1"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8003/api/v1"

          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3